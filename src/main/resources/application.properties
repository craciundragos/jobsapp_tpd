spring.application.name=jobsapp
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

file.upload-temp-dir=${UPLOAD_TEMP_DIR:/tmp/jobsapp_resumes}
spring.web.resources.static-locations=file:${UPLOAD_TEMP_DIR:/tmp/jobsapp_resumes}/,classpath:/static/

spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:granite4:3b}
spring.ai.ollama.chat.options.temperature=${OLLAMA_TEMPERATURE:0.2}

ollama.embeddings-url=${OLLAMA_EMBEDDINGS_URL:http://localhost:11434/api/embeddings}
chroma.collections-url=${CHROMA_COLLECTIONS_URL:http://localhost:8000/api/v1/collections}
chroma.cv-collection=${CHROMA_CV_COLLECTION:jobsapp_cvs}
chroma.job-req-collection=${CHROMA_JOB_REQ_COLLECTION:jobsapp_job_requirements}

aws.s3.bucket=${AWS_S3_BUCKET:jobsapp-resumes}
aws.s3.region=${AWS_REGION:eu-central-1}


services.ai.base-url=${AI_SERVICE_BASE_URL:http://localhost:8081}

logging.level.org.springframework.ai=${SPRING_AI_LOG_LEVEL:INFO}
logging.level.io.modelcontextprotocol=${MCP_LOG_LEVEL:INFO}
logging.level.org.springframework.ai.ollama=${OLLAMA_LOG_LEVEL:INFO}
logging.level.org.springframework.ai.ollama.api=${OLLAMA_API_LOG_LEVEL:INFO}
logging.level.org.springframework.web.client=${WEB_CLIENT_LOG_LEVEL:INFO}
logging.level.org.springframework.http.client=${HTTP_CLIENT_LOG_LEVEL:INFO}

spring.ai.retry.max-attempts=1
spring.ai.retry.backoff.initial-interval=1s
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=2s

spring.ai.ollama.chat.options.num-predict=128
spring.ai.ollama.chat.options.num-ctx=1024
spring.ai.ollama.chat.options.keep-alive=2m